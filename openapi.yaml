openapi: 3.0.3

info:
  title: Yaksha FAQ Portal API
  description: |
    Full REST API for the Yaksha FAQ & Community platform.

    ## Authentication
    Most routes require a **Bearer JWT token**.
    1. Call `POST /api/auth/login` to get a token.
    2. Click **Authorize** (🔒) and enter `Bearer <token>`.

    ## Roles
    | Role | Access |
    |---|---|
    | `user` | All `/api/auth`, `/api/faq`, `/api/community`, `/api/search` |
    | `admin` / `moderator` | All of the above + all `/api/admin/*` |
  version: 1.0.0
  contact:
    name: Yaksha FAQ Support

servers:
  - url: http://localhost:5000/api
    description: Local development
  - url: https://yaksha-faq-backend.vercel.app/api
    description: Production (Vercel)

tags:
  - name: Auth
    description: Register, login, and get current user
  - name: FAQ
    description: Browse and read FAQs (user-facing)
  - name: Community
    description: Community posts, upvotes, and comments
  - name: Search
    description: Semantic hybrid search and trending queries
  - name: Admin – Overview
    description: Dashboard stats and chart data (admin only)
  - name: Admin – FAQs
    description: Full CRUD for FAQ management (admin only)
  - name: Admin – Users
    description: User listing and activity (admin only)
  - name: Admin – Reports
    description: Data export and reports (admin only)

# ─── Security ────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Paste your token from the login response: `Bearer <token>`"

  schemas:

    # ── Auth ──────────────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Khushi Sharma
        email:
          type: string
          format: email
          example: khushi@iitm.ac.in
        password:
          type: string
          minLength: 6
          example: secret123

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@yaksha.com
        password:
          type: string
          example: admin123

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
          example: 664abc123def456789000001
        name:
          type: string
          example: Admin User
        email:
          type: string
          example: admin@yaksha.com
        role:
          type: string
          enum: [user, moderator, admin, ai_moderator]
          example: admin

    # ── FAQ ───────────────────────────────────────────────────────────────────
    FAQ:
      type: object
      properties:
        _id:
          type: string
          example: 664abc123def456789000002
        question:
          type: string
          example: How do I submit my assignment on the portal?
        answer:
          type: string
          example: Go to the Assignments section, click Upload, and attach your file.
        category:
          type: string
          example: Assignments
        status:
          type: string
          enum: [pending, approved, rejected]
          example: approved
        views:
          type: integer
          example: 42
        helpfulVotes:
          type: integer
          example: 18
        searchCount:
          type: integer
          example: 7
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FAQGrouped:
      type: object
      properties:
        grouped:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/FAQ'
          example:
            Assignments:
              - _id: "664abc1"
                question: "How do I submit?"
                answer: "Go to Assignments."
                createdAt: "2024-01-01T00:00:00Z"
        total:
          type: integer
          example: 150

    # ── Community ─────────────────────────────────────────────────────────────
    CommunityPost:
      type: object
      properties:
        _id:
          type: string
          example: 664abc123def456789000003
        title:
          type: string
          example: Is there an extension for the mid-sem project?
        body:
          type: string
          example: I couldn't finish my project due to illness. Is an extension possible?
        status:
          type: string
          enum: [unanswered, answered, resolved]
          example: unanswered
        author:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
              example: Ravi Kumar
        upvotes:
          type: array
          items:
            type: string
          example: ["664abc1", "664abc2"]
        comments:
          type: array
          items:
            type: object
            properties:
              _id:
                type: string
              body:
                type: string
                example: I have the same issue!
              author:
                type: object
                properties:
                  name:
                    type: string
              createdAt:
                type: string
                format: date-time
        createdAt:
          type: string
          format: date-time

    # ── Search ────────────────────────────────────────────────────────────────
    SearchResult:
      type: object
      properties:
        _id:
          type: string
        source:
          type: string
          enum: [faq, community]
        question:
          type: string
        answer:
          type: string
        title:
          type: string
        body:
          type: string
        category:
          type: string
        rrfScore:
          type: number
          example: 0.031
        vectorScore:
          type: number
          example: 0.87
        textScore:
          type: number
          example: 1.2

    # ── Admin ─────────────────────────────────────────────────────────────────
    AdminStats:
      type: object
      properties:
        totalFaqs:
          type: integer
          example: 150
        pendingFaqs:
          type: integer
          example: 4
        approvedFaqs:
          type: integer
          example: 143
        rejectedFaqs:
          type: integer
          example: 3
        totalUsers:
          type: integer
          example: 28
        searchesToday:
          type: integer
          example: 17
        totalSearches:
          type: integer
          example: 842
        unanswered:
          type: integer
          example: 4
        topCategory:
          type: string
          example: Assignments
        newUsersThisWeek:
          type: integer
          example: 5
        trends:
          type: object
          properties:
            faqs:
              type: number
              example: 12.5

    # ── Errors ────────────────────────────────────────────────────────────────
    Error:
      type: object
      properties:
        message:
          type: string
          example: Not authorized. No token provided.

# ─── Paths ───────────────────────────────────────────────────────────────────

paths:

  # ═══════════════════════════════════════════════════════════════════════════
  # AUTH
  # ═══════════════════════════════════════════════════════════════════════════

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates a new account. Returns a JWT token valid for 7 days.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: Khushi Sharma
              email: khushi@iitm.ac.in
              password: secret123
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing fields or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_fields:
                  value: { message: "Name, email, and password are required." }
                duplicate_email:
                  value: { message: "User with this email already exists." }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and get JWT token
      description: |
        Returns a JWT token on success.
        Use the token in the **Authorize** dialog or pass it as:
        `Authorization: Bearer <token>`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              admin:
                summary: Admin account (after seeding)
                value:
                  email: admin@yaksha.com
                  password: admin123
              regular_user:
                summary: Regular user (after seeding)
                value:
                  email: user@yaksha.com
                  password: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Invalid email or password.

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current logged-in user
      description: Returns the profile of the user whose token is provided.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ═══════════════════════════════════════════════════════════════════════════
  # FAQ (USER-FACING)
  # ═══════════════════════════════════════════════════════════════════════════

  /faq:
    get:
      tags: [FAQ]
      summary: Get all FAQs grouped by category
      description: Returns all approved FAQs grouped by their category. Requires authentication.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: FAQs grouped by category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FAQGrouped'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /faq/{id}:
    get:
      tags: [FAQ]
      summary: Get a single FAQ by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB ObjectId of the FAQ
          schema:
            type: string
            example: 664abc123def456789000002
      responses:
        '200':
          description: Single FAQ document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FAQ'
        '404':
          description: FAQ not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ═══════════════════════════════════════════════════════════════════════════
  # COMMUNITY
  # ═══════════════════════════════════════════════════════════════════════════

  /community:
    get:
      tags: [Community]
      summary: Get all community posts
      description: Returns all posts sorted by newest first, with populated author names and comments.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of community posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommunityPost'
                  total:
                    type: integer
                    example: 12

    post:
      tags: [Community]
      summary: Create a new community post
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, body]
              properties:
                title:
                  type: string
                  example: Is there an extension for the mid-sem project?
                body:
                  type: string
                  example: I couldn't finish my project due to illness. Is an extension possible?
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                type: object
                properties:
                  post:
                    $ref: '#/components/schemas/CommunityPost'
        '400':
          description: Title and body are required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /community/{id}:
    get:
      tags: [Community]
      summary: Get a single community post
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 664abc123def456789000003
      responses:
        '200':
          description: Single community post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityPost'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /community/{id}/upvote:
    post:
      tags: [Community]
      summary: Toggle upvote on a post
      description: If you have already upvoted, calling this removes your upvote. Otherwise it adds one.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 664abc123def456789000003
      responses:
        '200':
          description: Updated upvote count
          content:
            application/json:
              schema:
                type: object
                properties:
                  upvotes:
                    type: integer
                    example: 5
                  upvotedByMe:
                    type: boolean
                    example: true

  /community/{id}/comments:
    post:
      tags: [Community]
      summary: Add a comment to a post
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 664abc123def456789000003
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
                  example: I have the same issue, please clarify!
      responses:
        '201':
          description: Comment added
          content:
            application/json:
              schema:
                type: object
                properties:
                  comment:
                    type: object
                    properties:
                      _id:
                        type: string
                      body:
                        type: string
                      author:
                        type: object

  /community/{id}/resolve:
    patch:
      tags: [Community]
      summary: Mark a post as resolved
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 664abc123def456789000003
      responses:
        '200':
          description: Post marked as resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  post:
                    $ref: '#/components/schemas/CommunityPost'

  # ═══════════════════════════════════════════════════════════════════════════
  # SEARCH
  # ═══════════════════════════════════════════════════════════════════════════

  /search:
    post:
      tags: [Search]
      summary: Hybrid semantic + keyword search
      description: |
        Runs a **hybrid search** combining:
        - Vector similarity search (semantic)
        - MongoDB full-text search (keyword)
        - Reciprocal Rank Fusion (RRF) to merge results

        Searches both FAQs and community posts.
        Results are cached for 1 hour per query.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  example: how to submit assignment
            examples:
              assignment:
                summary: Assignment submission query
                value:
                  query: how to submit assignment
              payment:
                summary: Fee payment query
                value:
                  query: when is the fee due
      responses:
        '200':
          description: Search results ranked by relevance
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SearchResult'
                  total:
                    type: integer
                    example: 3
                  cached:
                    type: boolean
                    example: false
        '400':
          description: Missing query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search/trending:
    get:
      tags: [Search]
      summary: Get top 6 trending search queries
      description: Returns the most frequently searched terms aggregated from search logs.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Trending queries
          content:
            application/json:
              schema:
                type: object
                properties:
                  trending:
                    type: array
                    items:
                      type: object
                      properties:
                        query:
                          type: string
                          example: assignment submission
                        count:
                          type: integer
                          example: 34
                        lastSearched:
                          type: string
                          format: date-time

  # ═══════════════════════════════════════════════════════════════════════════
  # ADMIN – OVERVIEW
  # ═══════════════════════════════════════════════════════════════════════════

  /admin/stats:
    get:
      tags: [Admin – Overview]
      summary: Get dashboard overview stats
      description: |
        Returns all KPIs for the admin dashboard.
        **Requires admin or moderator role.**
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStats'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Access denied. Admin role required.

  /admin/faq-growth:
    get:
      tags: [Admin – Overview]
      summary: FAQ growth data for line/area chart
      description: Returns the count of FAQs added per day over the specified window. Missing days are filled with 0.
      security:
        - BearerAuth: []
      parameters:
        - name: days
          in: query
          description: Number of days to look back (default 30)
          schema:
            type: integer
            default: 30
            example: 21
      responses:
        '200':
          description: Daily FAQ creation counts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: string
                      example: "2025-05-01"
                    count:
                      type: integer
                      example: 3

  /admin/top-categories:
    get:
      tags: [Admin – Overview]
      summary: FAQ count per category (pie chart data)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Assignments
                    count:
                      type: integer
                      example: 24
                    views:
                      type: integer
                      example: 312

  /admin/search-insights:
    get:
      tags: [Admin – Overview]
      summary: Search analytics and keyword stats
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Search insight data
          content:
            application/json:
              schema:
                type: object
                properties:
                  topQueries:
                    type: array
                    items:
                      type: object
                      properties:
                        term:
                          type: string
                          example: assignment submission
                        count:
                          type: integer
                          example: 34
                  failedSearches:
                    type: integer
                    example: 12
                  totalSearches:
                    type: integer
                    example: 842
                  failRate:
                    type: string
                    example: "1.4"
                  recentActivity:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          example: "2025-05-20"
                        count:
                          type: integer
                          example: 17
                        noResults:
                          type: integer
                          example: 2

  /admin/user-activity-chart:
    get:
      tags: [Admin – Overview]
      summary: Daily user and search activity chart data
      security:
        - BearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 14
            example: 14
      responses:
        '200':
          description: Daily activity data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: string
                      example: "2025-05-20"
                    searches:
                      type: integer
                      example: 17
                    users:
                      type: integer
                      example: 9

  /admin/activity-feed:
    get:
      tags: [Admin – Overview]
      summary: Recent admin action log (last 20 entries)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Admin activity log
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id:
                      type: string
                    adminId:
                      type: object
                      properties:
                        name:
                          type: string
                        email:
                          type: string
                    action:
                      type: string
                      enum: [approve_faq, reject_faq, edit_faq, delete_faq, create_faq, login, settings_update]
                      example: approve_faq
                    targetType:
                      type: string
                      example: faq
                    details:
                      type: string
                    createdAt:
                      type: string
                      format: date-time

  # ═══════════════════════════════════════════════════════════════════════════
  # ADMIN – FAQ MANAGEMENT
  # ═══════════════════════════════════════════════════════════════════════════

  /admin/faqs:
    get:
      tags: [Admin – FAQs]
      summary: List all FAQs with filters, search, and pagination
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: search
          in: query
          description: Full-text search across question and answer
          schema:
            type: string
            example: assignment
        - name: status
          in: query
          schema:
            type: string
            enum: [approved, pending, rejected]
            example: pending
        - name: category
          in: query
          schema:
            type: string
            example: Assignments
        - name: sort
          in: query
          description: MongoDB sort field. Prefix with `-` for descending.
          schema:
            type: string
            default: -createdAt
            enum:
              - -createdAt
              - createdAt
              - -views
              - -helpfulVotes
      responses:
        '200':
          description: Paginated FAQ list
          content:
            application/json:
              schema:
                type: object
                properties:
                  faqs:
                    type: array
                    items:
                      $ref: '#/components/schemas/FAQ'
                  total:
                    type: integer
                    example: 150
                  page:
                    type: integer
                    example: 1
                  pages:
                    type: integer
                    example: 15
                  categories:
                    type: array
                    items:
                      type: string
                    example: [Assignments, Payments, Exams]

    post:
      tags: [Admin – FAQs]
      summary: Create a new FAQ
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question, answer, category]
              properties:
                question:
                  type: string
                  example: How do I reset my portal password?
                answer:
                  type: string
                  example: Go to Settings > Security > Reset Password and follow the steps.
                category:
                  type: string
                  example: Account
                status:
                  type: string
                  enum: [approved, pending]
                  default: approved
                  example: approved
      responses:
        '201':
          description: FAQ created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: FAQ created.
                  faq:
                    $ref: '#/components/schemas/FAQ'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/faq/approve:
    post:
      tags: [Admin – FAQs]
      summary: Approve a FAQ
      description: Sets `status` to `approved`. Logs the action.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  example: 664abc123def456789000002
      responses:
        '200':
          description: FAQ approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: FAQ approved.
                  faq:
                    $ref: '#/components/schemas/FAQ'
        '404':
          description: FAQ not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/faq/reject:
    post:
      tags: [Admin – FAQs]
      summary: Reject a FAQ
      description: Sets `status` to `rejected`. Logs the action.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  example: 664abc123def456789000002
      responses:
        '200':
          description: FAQ rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: FAQ rejected.
                  faq:
                    $ref: '#/components/schemas/FAQ'

  /admin/faq/{id}:
    put:
      tags: [Admin – FAQs]
      summary: Update a FAQ
      description: Updates any combination of question, answer, category, or status. Logs the action.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 664abc123def456789000002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                  example: How do I submit my assignment?
                answer:
                  type: string
                  example: Updated answer here.
                category:
                  type: string
                  example: Assignments
                status:
                  type: string
                  enum: [pending, approved, rejected]
            example:
              answer: Go to the portal, click Submit, and attach your file before the deadline.
              status: approved
      responses:
        '200':
          description: FAQ updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: FAQ updated.
                  faq:
                    $ref: '#/components/schemas/FAQ'
        '404':
          description: FAQ not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Admin – FAQs]
      summary: Permanently delete a FAQ
      description: Deletes the FAQ document from the database. This action is irreversible. Logs the action.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 664abc123def456789000002
      responses:
        '200':
          description: FAQ deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: FAQ deleted.
        '404':
          description: FAQ not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ═══════════════════════════════════════════════════════════════════════════
  # ADMIN – USERS
  # ═══════════════════════════════════════════════════════════════════════════

  /admin/users:
    get:
      tags: [Admin – Users]
      summary: List all users with optional search and pagination
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          description: Search by name or email (case-insensitive)
          schema:
            type: string
            example: khushi
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  total:
                    type: integer
                    example: 28
                  page:
                    type: integer
                    example: 1
                  pages:
                    type: integer
                    example: 2

  # ═══════════════════════════════════════════════════════════════════════════
  # ADMIN – REPORTS
  # ═══════════════════════════════════════════════════════════════════════════

  /admin/reports:
    get:
      tags: [Admin – Reports]
      summary: Generate a data export report
      description: |
        Returns FAQs and search logs within the given date range (or all data if no range is specified).
        Use this endpoint to power CSV/JSON exports from the Reports page.
      security:
        - BearerAuth: []
      parameters:
        - name: from
          in: query
          description: Start date (ISO 8601)
          schema:
            type: string
            format: date
            example: "2025-01-01"
        - name: to
          in: query
          description: End date (ISO 8601)
          schema:
            type: string
            format: date
            example: "2025-05-31"
      responses:
        '200':
          description: Report data
          content:
            application/json:
              schema:
                type: object
                properties:
                  faqs:
                    type: array
                    items:
                      $ref: '#/components/schemas/FAQ'
                  searchLogs:
                    type: array
                    items:
                      type: object
                      properties:
                        query:
                          type: string
                        resultsCount:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
                  summary:
                    type: object
                    properties:
                      totalFaqs:
                        type: integer
                        example: 150
                      totalSearches:
                        type: integer
                        example: 842
                      categoryBreakdown:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                            count:
                              type: integer
                      statusBreakdown:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                            count:
                              type: integer

  # ═══════════════════════════════════════════════════════════════════════════
  # HEALTH
  # ═══════════════════════════════════════════════════════════════════════════

  /health:
    get:
      tags: [Auth]
      summary: Backend health check
      description: No authentication required. Use to verify the server is up.
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 0.1.0
